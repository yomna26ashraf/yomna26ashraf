<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 260" role="img" aria-label="Let's turn data into decisions — open to roles and collaboration">
  <defs>
    <linearGradient id="ltText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffb38a"/>
      <stop offset="50%" stop-color="#ff5fa2"/>
      <stop offset="100%" stop-color="#b79cff"/>
    </linearGradient>
    <linearGradient id="ltEnv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff6fb"/>
      <stop offset="100%" stop-color="#ffe9f4"/>
    </linearGradient>
    <linearGradient id="ltFlap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd0e6"/>
      <stop offset="100%" stop-color="#ffb6d8"/>
    </linearGradient>
    <filter id="ltShadow" x="-40%" y="-40%" width="180%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#ff9ec7" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- twinkles -->
  <g fill="#c9a8ff">
    <circle cx="120" cy="60" r="2.4"><animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="80" r="2.6"><animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="190" r="2.2"><animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="200" r="2.2"><animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="1.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- envelope, gently floating -->
  <g transform="translate(190,130)">
    <animateTransform attributeName="transform" additive="sum" type="translate" values="0,0;0,-7;0,0" dur="3.4s" repeatCount="indefinite"/>

    <!-- letter sliding up with a heart -->
    <g>
      <rect x="-58" y="-86" width="116" height="74" rx="8" fill="#ffffff" stroke="#ffd9ec" stroke-width="2"/>
      <g transform="translate(0,-49)">
        <path d="M0,4 C0,-5 -12,-5 -12,4 C-12,13 0,18 0,23 C0,18 12,13 12,4 C12,-5 0,-5 0,4 Z" fill="#ff5fa2">
          <animateTransform attributeName="transform" type="scale" values="1;1.22;1" dur="1.2s" repeatCount="indefinite"/>
        </path>
      </g>
      <line x1="-40" y1="-22" x2="40" y2="-22" stroke="#ffe1ef" stroke-width="3" stroke-linecap="round"/>
      <animateTransform attributeName="transform" type="translate" values="0,30;0,0" dur="1s" begin="0.3s" fill="freeze"/>
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.3s" fill="freeze"/>
    </g>

    <!-- envelope body -->
    <rect x="-78" y="-18" width="156" height="96" rx="12" fill="url(#ltEnv)" stroke="#ffc6e0" stroke-width="2" filter="url(#ltShadow)"/>
    <path d="M-78,78 L-4,18 a8,8 0 0 1 8,0 L78,78 Z" fill="#fff0f7" stroke="#ffc6e0" stroke-width="2"/>
    <!-- flap opening -->
    <path d="M-78,-18 L0,40 L78,-18 Z" fill="url(#ltFlap)" stroke="#ffb6d8" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="0 0 -18;-168 0 -18" dur="1s" begin="1.3s" fill="freeze"/>
    </path>
  </g>

  <!-- message -->
  <text x="430" y="116" font-family="'Segoe UI',Verdana,sans-serif" font-size="34" font-weight="800" fill="url(#ltText)">let's turn data into decisions</text>
  <text x="432" y="150" font-family="'Segoe UI',Verdana,sans-serif" font-size="15" fill="#9a6f88">Data Analyst · Applied AI &amp; ML — open to roles &amp; collaboration</text>
  <g transform="translate(432,176)">
    <rect x="0" y="0" width="150" height="34" rx="17" fill="#ff5fa2"/>
    <text x="75" y="22" text-anchor="middle" font-family="'Segoe UI',Verdana,sans-serif" font-size="13.5" font-weight="800" fill="#ffffff">say hi ♡</text>
    <animate attributeName="opacity" values="1;0.78;1" dur="2.6s" repeatCount="indefinite"/>
  </g>
  <text x="600" y="199" font-family="'Segoe UI',Verdana,sans-serif" font-size="13" fill="#b08aa0">yomna26ashraf@gmail.com</text>
</svg>
