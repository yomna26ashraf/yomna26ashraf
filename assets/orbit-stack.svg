<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-label="Tech stack — orbital visualization">
  <defs>
    <radialGradient id="obg" cx="50%" cy="50%" r="65%">
      <stop offset="0%"   stop-color="#2e1226"/>
      <stop offset="60%"  stop-color="#1b0a16"/>
      <stop offset="100%" stop-color="#120710"/>
    </radialGradient>
    <linearGradient id="oR1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ff6fae" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff6fae" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff6fae" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="oR2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#c084fc" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c084fc" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="oR3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ffb38a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffb38a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffb38a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="coreG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb38a"/>
      <stop offset="50%" stop-color="#ff6fae"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="og" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="og2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <!-- Reusable orbit paths so chips can attach via mpath -->
    <path id="path1" d="M 170 0 A 170 55 0 1 1 -170 0 A 170 55 0 1 1 170 0"/>
    <path id="path2" d="M 290 0 A 290 85 0 1 0 -290 0 A 290 85 0 1 0 290 0"/>
    <path id="path3" d="M 400 0 A 400 130 0 1 1 -400 0 A 400 130 0 1 1 400 0"/>

    <g id="ostar"><path d="M 0 -3 L .8 -.8 L 3 0 L .8 .8 L 0 3 L -.8 .8 L -3 0 L -.8 -.8 Z" fill="#ffd9ec"/></g>
    <g id="ocore">
      <path d="M 0 12 C -16 -10, -44 6, 0 38 C 44 6, 16 -10, 0 12 Z" fill="url(#coreG)" filter="url(#og)"/>
    </g>
  </defs>

  <rect width="1200" height="540" fill="url(#obg)"/>

  <!-- ambient glows -->
  <circle cx="600" cy="290" r="220" fill="#d9489a" opacity=".22" filter="url(#og2)">
    <animate attributeName="opacity" values=".15;.3;.15" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="120" r="80" fill="#c084fc" opacity=".18" filter="url(#og2)"/>
  <circle cx="1000" cy="420" r="80" fill="#ffb38a" opacity=".18" filter="url(#og2)"/>

  <!-- sparkle field -->
  <g opacity=".75">
    <use href="#ostar" x="80"  y="60"><animate attributeName="opacity" values=".3;1;.3" dur="3.1s" repeatCount="indefinite"/></use>
    <use href="#ostar" x="160" y="120"><animate attributeName="opacity" values=".2;.9;.2" dur="2.7s" repeatCount="indefinite"/></use>
    <use href="#ostar" x="280" y="80"><animate attributeName="opacity" values=".2;1;.2" dur="3.6s" repeatCount="indefinite"/></use>
    <use href="#ostar" x="380" y="40"><animate attributeName="opacity" values=".1;.8;.1" dur="2.9s" repeatCount="indefinite"/></use>
    <use href="#ostar" x="500" y="80"><animate attributeName="opacity" values=".2;1;.2" dur="4.1s" repeatCount="indefinite"/></use>
    <use href="#ostar" x="640" y="50"><animate attributeName="opacity" values=".2;.9;.2" dur="2.7s" repeatCount="indefinite"/></use>
    <use href="#ostar" x="780" y="110"><animate attributeName="opacity" values=".2;1;.2" dur="3.5s" repeatCount="indefinite"/></use>
    <use href="#ostar" x="900" y="60"><animate attributeName="opacity" values=".1;.8;.1" dur="2.2s" repeatCount="indefinite"/></use>
    <use href="#ostar" x="1020" y="100"><animate attributeName="opacity" values=".2;1;.2" dur="3.3s" repeatCount="indefinite"/></use>
    <use href="#ostar" x="1140" y="40"><animate attributeName="opacity" values=".1;.9;.1" dur="4.4s" repeatCount="indefinite"/></use>
    <use href="#ostar" x="60"  y="450"><animate attributeName="opacity" values=".3;1;.3" dur="3.1s" repeatCount="indefinite"/></use>
    <use href="#ostar" x="320" y="510"><animate attributeName="opacity" values=".2;1;.2" dur="3.6s" repeatCount="indefinite"/></use>
    <use href="#ostar" x="700" y="520"><animate attributeName="opacity" values=".2;1;.2" dur="4.1s" repeatCount="indefinite"/></use>
    <use href="#ostar" x="1080" y="510"><animate attributeName="opacity" values=".2;1;.2" dur="3.5s" repeatCount="indefinite"/></use>
  </g>

  <!-- title -->
  <g transform="translate(600 50)" text-anchor="middle">
    <text fill="#e7a8c9" font-size="11" letter-spacing="6" y="0" font-family="JetBrains Mono, ui-monospace, Menlo, Consolas, monospace">/// THE STACK · ORBITAL VIEW</text>
    <text fill="#ffe4ef" font-size="22" letter-spacing="2" font-weight="700" y="28" font-family="Inter, system-ui, sans-serif">Insight at the core. Models in orbit.</text>
  </g>

  <!-- ORBIT SYSTEM -->
  <g transform="translate(600 290)">

    <!-- Outer dashed boundary -->
    <circle r="450" fill="none" stroke="#c084fc" stroke-opacity=".18" stroke-dasharray="3 8"/>

    <!-- Visual ring guides -->
    <use href="#path1" fill="none" stroke="url(#oR1)" stroke-width="1.4"/>
    <use href="#path2" fill="none" stroke="url(#oR2)" stroke-width="1.2"/>
    <use href="#path3" fill="none" stroke="url(#oR3)" stroke-width="1.1"/>

    <!-- core heart -->
    <circle r="58" fill="#1b0a16" stroke="#ff6fae" stroke-opacity=".5"/>
    <g transform="translate(0 -19)"><use href="#ocore"/></g>
    <text text-anchor="middle" y="6" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#120710">DATA</text>

    <!-- RING 1 (pink) — core data. 3 chips, dur=20s -->
    <g>
      <rect x="-32" y="-15" width="64" height="30" rx="15" fill="#1b0a16" stroke="#ff6fae"/>
      <text text-anchor="middle" y="5" font-family="Inter, sans-serif" font-size="13" fill="#ff8fc2" font-weight="600">SQL</text>
      <animateMotion dur="20s" repeatCount="indefinite" rotate="0"><mpath href="#path1"/></animateMotion>
    </g>
    <g>
      <rect x="-40" y="-15" width="80" height="30" rx="15" fill="#1b0a16" stroke="#ff6fae"/>
      <text text-anchor="middle" y="5" font-family="Inter, sans-serif" font-size="13" fill="#ff8fc2" font-weight="600">Python</text>
      <animateMotion dur="20s" begin="-6.667s" repeatCount="indefinite" rotate="0"><mpath href="#path1"/></animateMotion>
    </g>
    <g>
      <rect x="-44" y="-15" width="88" height="30" rx="15" fill="#1b0a16" stroke="#ff6fae"/>
      <text text-anchor="middle" y="5" font-family="Inter, sans-serif" font-size="13" fill="#ff8fc2" font-weight="600">Power BI</text>
      <animateMotion dur="20s" begin="-13.334s" repeatCount="indefinite" rotate="0"><mpath href="#path1"/></animateMotion>
    </g>

    <!-- RING 2 (lavender) — ML / AI. 4 chips, dur=28s, reverse -->
    <g>
      <rect x="-50" y="-15" width="100" height="30" rx="15" fill="#1b0a16" stroke="#c084fc"/>
      <text text-anchor="middle" y="5" font-family="Inter, sans-serif" font-size="13" fill="#cfa6fb" font-weight="600">scikit-learn</text>
      <animateMotion dur="28s" repeatCount="indefinite" rotate="0"><mpath href="#path2"/></animateMotion>
    </g>
    <g>
      <rect x="-42" y="-15" width="84" height="30" rx="15" fill="#1b0a16" stroke="#c084fc"/>
      <text text-anchor="middle" y="5" font-family="Inter, sans-serif" font-size="13" fill="#cfa6fb" font-weight="600">PyTorch</text>
      <animateMotion dur="28s" begin="-7s" repeatCount="indefinite" rotate="0"><mpath href="#path2"/></animateMotion>
    </g>
    <g>
      <rect x="-42" y="-15" width="84" height="30" rx="15" fill="#1b0a16" stroke="#c084fc"/>
      <text text-anchor="middle" y="5" font-family="Inter, sans-serif" font-size="13" fill="#cfa6fb" font-weight="600">Pandas</text>
      <animateMotion dur="28s" begin="-14s" repeatCount="indefinite" rotate="0"><mpath href="#path2"/></animateMotion>
    </g>
    <g>
      <rect x="-38" y="-15" width="76" height="30" rx="15" fill="#1b0a16" stroke="#c084fc"/>
      <text text-anchor="middle" y="5" font-family="Inter, sans-serif" font-size="13" fill="#cfa6fb" font-weight="600">NumPy</text>
      <animateMotion dur="28s" begin="-21s" repeatCount="indefinite" rotate="0"><mpath href="#path2"/></animateMotion>
    </g>

    <!-- RING 3 (peach) — tools / viz. 5 chips, dur=36s -->
    <g>
      <rect x="-36" y="-15" width="72" height="30" rx="15" fill="#1b0a16" stroke="#ffb38a"/>
      <text text-anchor="middle" y="5" font-family="Inter, sans-serif" font-size="13" fill="#ffc7a3" font-weight="600">Excel</text>
      <animateMotion dur="36s" repeatCount="indefinite" rotate="0"><mpath href="#path3"/></animateMotion>
    </g>
    <g>
      <rect x="-50" y="-15" width="100" height="30" rx="15" fill="#1b0a16" stroke="#ffb38a"/>
      <text text-anchor="middle" y="5" font-family="Inter, sans-serif" font-size="13" fill="#ffc7a3" font-weight="600">SQL Server</text>
      <animateMotion dur="36s" begin="-7.2s" repeatCount="indefinite" rotate="0"><mpath href="#path3"/></animateMotion>
    </g>
    <g>
      <rect x="-40" y="-15" width="80" height="30" rx="15" fill="#1b0a16" stroke="#ffb38a"/>
      <text text-anchor="middle" y="5" font-family="Inter, sans-serif" font-size="13" fill="#ffc7a3" font-weight="600">Seaborn</text>
      <animateMotion dur="36s" begin="-14.4s" repeatCount="indefinite" rotate="0"><mpath href="#path3"/></animateMotion>
    </g>
    <g>
      <rect x="-40" y="-15" width="80" height="30" rx="15" fill="#1b0a16" stroke="#ffb38a"/>
      <text text-anchor="middle" y="5" font-family="Inter, sans-serif" font-size="13" fill="#ffc7a3" font-weight="600">Jupyter</text>
      <animateMotion dur="36s" begin="-21.6s" repeatCount="indefinite" rotate="0"><mpath href="#path3"/></animateMotion>
    </g>
    <g>
      <rect x="-30" y="-15" width="60" height="30" rx="15" fill="#1b0a16" stroke="#ffb38a"/>
      <text text-anchor="middle" y="5" font-family="Inter, sans-serif" font-size="13" fill="#ffc7a3" font-weight="600">LSTM</text>
      <animateMotion dur="36s" begin="-28.8s" repeatCount="indefinite" rotate="0"><mpath href="#path3"/></animateMotion>
    </g>

  </g>
</svg>
