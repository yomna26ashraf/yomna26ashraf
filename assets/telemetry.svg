<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Live telemetry — analytics dashboard">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2a1124"/>
      <stop offset="100%" stop-color="#120710"/>
    </linearGradient>
    <linearGradient id="pinkFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ff6fae" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#ff6fae" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="violetFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#c084fc" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="peachFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffb38a" stop-opacity=".75"/>
      <stop offset="100%" stop-color="#ffb38a" stop-opacity="0"/>
    </linearGradient>
    <filter id="tg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tg2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#c084fc" stroke-opacity=".08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" fill="url(#tbg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>

  <!-- ambient glows -->
  <circle cx="180" cy="180" r="120" fill="#ff6fae" opacity=".10" filter="url(#tg2)"/>
  <circle cx="600" cy="180" r="160" fill="#c084fc" opacity=".12" filter="url(#tg2)"/>
  <circle cx="1020" cy="180" r="120" fill="#ffb38a" opacity=".10" filter="url(#tg2)"/>

  <!-- top bar -->
  <g transform="translate(40 36)" font-family="JetBrains Mono, ui-monospace, Menlo, Consolas, monospace">
    <text fill="#e7a8c9" font-size="11" letter-spacing="6">/// LIVE TELEMETRY · ANALYTICS WORKBENCH</text>
    <circle cx="330" cy="-4" r="3" fill="#ff6fae">
      <animate attributeName="opacity" values=".3;1;.3" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g transform="translate(1160 36)" font-family="JetBrains Mono, ui-monospace, Menlo, Consolas, monospace" text-anchor="end">
    <text fill="#e7a8c9" font-size="11" letter-spacing="3">SESSION · 2026 · DAMIETTA</text>
  </g>

  <!-- Panel A: SIGNAL — animated waveform -->
  <g transform="translate(40 70)">
    <rect width="360" height="240" rx="14" fill="#1b0a16" stroke="#ff6fae" stroke-opacity=".5"/>
    <text x="20" y="32" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#e7a8c9">// DATA · SIGNAL</text>
    <text x="20" y="64" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#ff6fae">50K<tspan font-size="14" fill="#e7a8c9">+ rows</tspan></text>
    <text x="20" y="84" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#ffd9ec" letter-spacing="2">CLEANED · TRUSTED · DECISION-READY</text>

    <path fill="url(#pinkFill)" stroke="#ff6fae" stroke-width="1.6" filter="url(#tg)"
          d="M 20 200 L 50 180 L 80 190 L 110 160 L 140 175 L 170 140 L 200 165 L 230 130 L 260 155 L 290 120 L 320 145 L 340 130 L 340 220 L 20 220 Z">
      <animate attributeName="d" dur="6s" repeatCount="indefinite"
        values="
          M 20 200 L 50 180 L 80 190 L 110 160 L 140 175 L 170 140 L 200 165 L 230 130 L 260 155 L 290 120 L 320 145 L 340 130 L 340 220 L 20 220 Z;
          M 20 200 L 50 165 L 80 175 L 110 145 L 140 165 L 170 130 L 200 150 L 230 115 L 260 140 L 290 105 L 320 130 L 340 115 L 340 220 L 20 220 Z;
          M 20 200 L 50 180 L 80 190 L 110 160 L 140 175 L 170 140 L 200 165 L 230 130 L 260 155 L 290 120 L 320 145 L 340 130 L 340 220 L 20 220 Z"/>
    </path>
    <circle r="4" fill="#ff6fae" filter="url(#tg)">
      <animate attributeName="cx" values="20;340;20" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="200;130;200" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Panel B: CORE METRICS — animated bars -->
  <g transform="translate(420 70)">
    <rect width="360" height="240" rx="14" fill="#1b0a16" stroke="#c084fc" stroke-opacity=".5"/>
    <text x="20" y="32" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#e7a8c9">// PIPELINE · IMPACT</text>

    <g transform="translate(40 100)">
      <!-- bar 1 -->
      <g>
        <rect x="0" y="0" width="36" height="120" rx="6" fill="#2a1124" stroke="#c084fc" stroke-opacity=".4"/>
        <rect x="0" y="120" width="36" height="0" rx="6" fill="url(#violetFill)">
          <animate attributeName="height" values="0;96;88;96" dur="5s" repeatCount="indefinite"/>
          <animate attributeName="y" values="120;24;32;24" dur="5s" repeatCount="indefinite"/>
        </rect>
      </g>
      <g transform="translate(64 0)">
        <rect x="0" y="0" width="36" height="120" rx="6" fill="#2a1124" stroke="#c084fc" stroke-opacity=".4"/>
        <rect x="0" y="120" width="36" height="0" rx="6" fill="url(#violetFill)">
          <animate attributeName="height" values="0;72;80;72" dur="5s" begin="-.6s" repeatCount="indefinite"/>
          <animate attributeName="y" values="120;48;40;48" dur="5s" begin="-.6s" repeatCount="indefinite"/>
        </rect>
      </g>
      <g transform="translate(128 0)">
        <rect x="0" y="0" width="36" height="120" rx="6" fill="#2a1124" stroke="#c084fc" stroke-opacity=".4"/>
        <rect x="0" y="120" width="36" height="0" rx="6" fill="url(#violetFill)">
          <animate attributeName="height" values="0;110;102;110" dur="5s" begin="-1.2s" repeatCount="indefinite"/>
          <animate attributeName="y" values="120;10;18;10" dur="5s" begin="-1.2s" repeatCount="indefinite"/>
        </rect>
      </g>
      <g transform="translate(192 0)">
        <rect x="0" y="0" width="36" height="120" rx="6" fill="#2a1124" stroke="#c084fc" stroke-opacity=".4"/>
        <rect x="0" y="120" width="36" height="0" rx="6" fill="url(#violetFill)">
          <animate attributeName="height" values="0;58;66;58" dur="5s" begin="-1.8s" repeatCount="indefinite"/>
          <animate attributeName="y" values="120;62;54;62" dur="5s" begin="-1.8s" repeatCount="indefinite"/>
        </rect>
      </g>
      <g transform="translate(256 0)">
        <rect x="0" y="0" width="36" height="120" rx="6" fill="#2a1124" stroke="#c084fc" stroke-opacity=".4"/>
        <rect x="0" y="120" width="36" height="0" rx="6" fill="url(#violetFill)">
          <animate attributeName="height" values="0;88;94;88" dur="5s" begin="-2.4s" repeatCount="indefinite"/>
          <animate attributeName="y" values="120;32;26;32" dur="5s" begin="-2.4s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>
    <text x="20" y="210" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#ffd9ec" letter-spacing="2">5+ DASHBOARDS · 3 PROJECTS · 15% EFFICIENCY</text>
  </g>

  <!-- Panel C: ACCURACY — radial gauge -->
  <g transform="translate(800 70)">
    <rect width="360" height="240" rx="14" fill="#1b0a16" stroke="#ffb38a" stroke-opacity=".5"/>
    <text x="20" y="32" font-family="JetBrains Mono, ui-monospace, monospace" font-size="11" letter-spacing="3" fill="#e7a8c9">// MODEL · ACCURACY</text>

    <g transform="translate(180 138)">
      <circle r="74" fill="none" stroke="#2a1124" stroke-width="14"/>
      <circle r="74" fill="none" stroke="#ffb38a" stroke-width="14" stroke-linecap="round"
              stroke-dasharray="465" stroke-dashoffset="465" transform="rotate(-90)" filter="url(#tg)">
        <animate attributeName="stroke-dashoffset" values="465;14;14" dur="4s" repeatCount="indefinite"/>
      </circle>
      <text text-anchor="middle" y="0" font-family="Inter, sans-serif" font-size="34" font-weight="800" fill="#ffb38a">99.4<tspan font-size="15" fill="#e7a8c9">%</tspan></text>
      <text text-anchor="middle" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffd9ec" letter-spacing="2">CLASSIFICATION</text>
    </g>
  </g>

  <!-- baseline scan line -->
  <line x1="40" y1="338" x2="1160" y2="338" stroke="#ff6fae" stroke-opacity=".25" stroke-width="1"/>
</svg>
