<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" role="img" aria-label="Animated divider">
  <defs>
    <linearGradient id="divLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffb38a" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#ffb38a" stop-opacity=".9"/>
      <stop offset="50%"  stop-color="#c084fc" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#ff6fae" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#ff6fae" stop-opacity="0"/>
    </linearGradient>
    <filter id="divG" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="divPath" d="M 0 30 L 1200 30"/>
    <!-- little heart, drawn around its own center -->
    <g id="heart">
      <path d="M 0 2 C -3 -3, -9 0, 0 7 C 9 0, 3 -3, 0 2 Z" fill="#ff6fae"/>
    </g>
    <g id="spark">
      <path d="M 0 -5 L 1 -1 L 5 0 L 1 1 L 0 5 L -1 1 L -5 0 L -1 -1 Z" fill="#fff0f7"/>
    </g>
  </defs>

  <!-- main animated waveform -->
  <path d="M 0 30
           Q 100 8, 200 30 T 400 30 T 600 30 T 800 30 T 1000 30 T 1200 30"
        fill="none" stroke="url(#divLine)" stroke-width="1.6" filter="url(#divG)">
    <animate attributeName="d" dur="6s" repeatCount="indefinite"
      values="M 0 30 Q 100 8, 200 30 T 400 30 T 600 30 T 800 30 T 1000 30 T 1200 30;
              M 0 30 Q 100 52, 200 30 T 400 30 T 600 30 T 800 30 T 1000 30 T 1200 30;
              M 0 30 Q 100 8, 200 30 T 400 30 T 600 30 T 800 30 T 1000 30 T 1200 30"/>
  </path>

  <!-- secondary subtle line -->
  <line x1="0" y1="30" x2="1200" y2="30" stroke="url(#divLine)" stroke-width=".6" opacity=".5"/>

  <!-- traveling hearts -->
  <use href="#heart" filter="url(#divG)">
    <animateMotion dur="5s" repeatCount="indefinite"><mpath href="#divPath"/></animateMotion>
    <animateTransform attributeName="transform" type="scale" additive="sum" values="1;1.3;1" dur="1.2s" repeatCount="indefinite"/>
  </use>
  <use href="#spark" opacity=".9">
    <animateMotion dur="5s" begin="-1.6s" repeatCount="indefinite"><mpath href="#divPath"/></animateMotion>
    <animateTransform attributeName="transform" type="rotate" additive="sum" from="0" to="360" dur="3s" repeatCount="indefinite"/>
  </use>
  <use href="#heart" filter="url(#divG)" opacity=".8">
    <animateMotion dur="5s" begin="-3.2s" repeatCount="indefinite"><mpath href="#divPath"/></animateMotion>
  </use>

  <!-- node markers -->
  <g fill="#1a0a16" stroke="#c084fc">
    <circle cx="160"  cy="30" r="3"/>
    <circle cx="600"  cy="30" r="4"/>
    <circle cx="1040" cy="30" r="3"/>
  </g>
</svg>
