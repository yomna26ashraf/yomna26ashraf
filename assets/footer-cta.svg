<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" role="img" aria-label="Open to collaboration">
  <defs>
    <radialGradient id="fbg" cx="50%" cy="60%" r="80%">
      <stop offset="0%"   stop-color="#2e1226"/>
      <stop offset="60%"  stop-color="#1b0a16"/>
      <stop offset="100%" stop-color="#120710"/>
    </radialGradient>
    <linearGradient id="fGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#ffb38a"/>
      <stop offset="50%"  stop-color="#ff6fae"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="fGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <g id="fheart"><path d="M 0 5 C -7 -5, -20 2, 0 18 C 20 2, 7 -5, 0 5 Z" fill="#ff6fae"/></g>
    <g id="fspark"><path d="M 0 -6 L 1.2 -1.2 L 6 0 L 1.2 1.2 L 0 6 L -1.2 1.2 L -6 0 L -1.2 -1.2 Z" fill="#fff0f7"/></g>
  </defs>

  <rect width="1200" height="240" fill="url(#fbg)"/>

  <!-- ambient glows -->
  <circle cx="220" cy="120" r="120" fill="#ffb38a" opacity=".18" filter="url(#fSoft)">
    <animate attributeName="opacity" values=".10;.24;.10" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="980" cy="120" r="120" fill="#ff6fae" opacity=".18" filter="url(#fSoft)">
    <animate attributeName="opacity" values=".10;.24;.10" dur="6s" begin="-2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="120" r="170" fill="#c084fc" opacity=".22" filter="url(#fSoft)">
    <animate attributeName="opacity" values=".15;.30;.15" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- twinkling sparkles -->
  <g>
    <use href="#fspark" x="120" y="50" opacity=".7"><animate attributeName="opacity" values=".2;1;.2" dur="3s" repeatCount="indefinite"/></use>
    <use href="#fspark" x="300" y="40" opacity=".7"><animate attributeName="opacity" values=".2;.9;.2" dur="2.6s" repeatCount="indefinite"/></use>
    <use href="#fspark" x="900" y="50" opacity=".7"><animate attributeName="opacity" values=".2;1;.2" dur="3.4s" repeatCount="indefinite"/></use>
    <use href="#fspark" x="1080" y="40" opacity=".7"><animate attributeName="opacity" values=".2;.9;.2" dur="2.3s" repeatCount="indefinite"/></use>
    <use href="#fspark" x="200" y="200" opacity=".7"><animate attributeName="opacity" values=".2;1;.2" dur="3.8s" repeatCount="indefinite"/></use>
    <use href="#fspark" x="1000" y="200" opacity=".7"><animate attributeName="opacity" values=".2;1;.2" dur="3.2s" repeatCount="indefinite"/></use>
  </g>

  <!-- transmitting concentric rings (beacon) -->
  <g transform="translate(600 120)" fill="none" stroke="#ff6fae">
    <circle r="40" stroke-opacity=".7">
      <animate attributeName="r" values="40;120;40" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values=".8;0;.8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="40" stroke-opacity=".5">
      <animate attributeName="r" values="40;160;40" dur="4s" begin="-1.3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values=".6;0;.6" dur="4s" begin="-1.3s" repeatCount="indefinite"/>
    </circle>
    <circle r="40" stroke-opacity=".4">
      <animate attributeName="r" values="40;200;40" dur="4s" begin="-2.6s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values=".4;0;.4" dur="4s" begin="-2.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- main message -->
  <g transform="translate(600 100)" text-anchor="middle">
    <text font-family="JetBrains Mono, ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="6" fill="#e7a8c9" y="0">/// SIGNAL · OPEN_TO_OPPORTUNITIES</text>
    <text font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" letter-spacing="1" y="42" fill="url(#fGrad)" filter="url(#fGlow)">Let's turn data into decisions.</text>
    <text font-family="Inter, system-ui, sans-serif" font-size="14" y="74" fill="#ffd9ec">Data Analyst · Applied AI &amp; ML · open to roles and collaboration</text>
  </g>

  <!-- pulsing heart accents -->
  <use href="#fheart" x="470" y="150" filter="url(#fGlow)">
    <animateTransform attributeName="transform" type="scale" additive="sum" values="1;1.25;1" dur="1.4s" repeatCount="indefinite"/>
  </use>
  <use href="#fheart" x="725" y="150" filter="url(#fGlow)">
    <animateTransform attributeName="transform" type="scale" additive="sum" values="1;1.25;1" dur="1.4s" begin="-.7s" repeatCount="indefinite"/>
  </use>
</svg>
