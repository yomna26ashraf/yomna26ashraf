name: generate snake animation

on:
  # Refresh the contribution snake twice a day.
  schedule:
    - cron: "0 */12 * * *"

  # allows manual triggering from the Actions tab
  workflow_dispatch:

  # also run on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install tsx so the generator can import the snk TypeScript sources directly.
      - name: Install tsx
        run: npm install --no-save --no-audit --no-fund tsx@4

      # Generate the SVGs without using any third-party action.
      # The script clones Platane/snk locally and pulls contribution data from
      # a public, unauthenticated API, so no GITHUB_TOKEN scopes are required.
      - name: Generate snake animation SVGs
        env:
          GITHUB_USER: ${{ github.repository_owner }}
        run: npx tsx .scripts/generate-snake-svgs.mjs

      # Publish to the `output` branch with plain git.
      - name: Push SVGs to the output branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          test -s dist/github-contribution-grid-snake.svg
          test -s dist/github-contribution-grid-snake-dark.svg

          STAGE="$(mktemp -d)"
          cp dist/github-contribution-grid-snake.svg "$STAGE/"
          cp dist/github-contribution-grid-snake-dark.svg "$STAGE/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin output >/dev/null 2>&1; then
            git fetch origin output
            git checkout -B output origin/output
          else
            git checkout --orphan output
            git rm -rf . >/dev/null 2>&1 || true
          fi

          cp "$STAGE/github-contribution-grid-snake.svg" .
          cp "$STAGE/github-contribution-grid-snake-dark.svg" .

          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: refresh snake animation"
          git push origin output
